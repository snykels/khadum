<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>خدوم — نظام الأزرار والخيارات</title>
<link rel="stylesheet" href="styles/tokens.css" />
<link rel="stylesheet" href="styles/01-atelier.css" />
<link rel="stylesheet" href="styles/02-midnight.css" />
<link rel="stylesheet" href="styles/03-studio.css" />
<link rel="stylesheet" href="styles/04-bazaar.css" />
<link rel="stylesheet" href="styles/05-pillow.css" />
<link rel="stylesheet" href="styles/06-terminal.css" />
<style>
  @font-face {
    font-family: 'Somar';
    src: url('fonts/Somar-Thin.otf') format('opentype');
    font-weight: 100;
    font-style: normal;
  }
  @font-face {
    font-family: 'Somar';
    src: url('fonts/Somar-Light.otf') format('opentype');
    font-weight: 300;
    font-style: normal;
  }
  @font-face {
    font-family: 'Somar';
    src: url('fonts/Somar-Regular.otf') format('opentype');
    font-weight: 400;
    font-style: normal;
  }
  @font-face {
    font-family: 'Somar';
    src: url('fonts/Somar-Medium.otf') format('opentype');
    font-weight: 500;
    font-style: normal;
  }
  @font-face {
    font-family: 'Somar';
    src: url('fonts/Somar-Bold.otf') format('opentype');
    font-weight: 700;
    font-style: normal;
  }
  @font-face {
    font-family: 'Somar';
    src: url('fonts/Somar-Black.otf') format('opentype');
    font-weight: 900;
    font-style: normal;
  }

  :root {
    --font-ar: 'Somar', sans-serif;
    --font-display: 'Space Grotesk', 'Somar', sans-serif;
    --brand: #34cc30;
    --navy: #485869;
    --navy-deep: #2f3a45;
    --navy-darker: #1f2730;
  }

  html, body { margin: 0; padding: 0; }
  body {
    font-family: var(--font-ar);
    background: #fafaf7;
    color: #1a1d22;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  .page {
    max-width: 1320px;
    margin: 0 auto;
    padding: 56px 32px 80px;
  }

  /* Masthead — newspaper-ish */
  .mast {
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: end;
    gap: 24px;
    border-bottom: 1.5px solid #1a1d22;
    padding-bottom: 24px;
    margin-bottom: 12px;
  }

  .mast__brand {
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 600;
    font-size: 14px;
    letter-spacing: 0.02em;
  }
  .mast__brand .dot {
    width: 10px; height: 10px;
    background: var(--brand);
    border-radius: 50%;
    box-shadow: 0 0 0 3px rgba(52,204,48,0.2);
  }

  .mast__meta {
    display: flex;
    gap: 24px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: #6b7280;
    letter-spacing: 0.02em;
  }

  /* A thinner second rule */
  .mast-rule-2 {
    height: 4px;
    border-bottom: 1px solid #1a1d22;
    margin-bottom: 40px;
  }

  /* Hero */
  .hero {
    display: grid;
    grid-template-columns: 1.4fr 1fr;
    gap: 48px;
    align-items: start;
    padding-bottom: 48px;
    margin-bottom: 24px;
  }

  .hero__title {
    font-family: 'Instrument Serif', serif;
    font-size: clamp(44px, 6vw, 76px);
    font-weight: 400;
    line-height: 0.98;
    letter-spacing: -0.02em;
    margin: 0 0 20px;
    color: #111418;
  }
  .hero__title em {
    font-style: italic;
    color: #1f7a1c;
  }
  .hero__title .u {
    position: relative;
    white-space: nowrap;
  }
  .hero__title .u::after {
    content: '';
    position: absolute;
    right: 0; left: 0; bottom: 6px;
    height: 8px;
    background: var(--brand);
    opacity: 0.35;
    z-index: -1;
  }

  .hero__lede {
    font-size: 17px;
    line-height: 1.65;
    color: #3c4450;
    max-width: 540px;
    margin: 0;
  }
  .hero__lede b { color: #111418; font-weight: 600; }

  .hero__side {
    padding: 20px 22px;
    background: #fff;
    border: 1px solid #e5e5e2;
    border-radius: 4px;
    position: relative;
  }
  .hero__side::before {
    content: '';
    position: absolute;
    top: -1px; right: -1px;
    width: 40px; height: 3px;
    background: var(--brand);
  }
  .hero__side h4 {
    margin: 0 0 8px;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #6b7280;
    font-family: 'JetBrains Mono', monospace;
  }
  .hero__side ul {
    margin: 0;
    padding: 0;
    list-style: none;
    font-size: 14px;
    line-height: 1.7;
    color: #3c4450;
  }
  .hero__side li {
    display: flex;
    justify-content: space-between;
    gap: 16px;
    border-bottom: 1px dashed #e5e5e2;
    padding: 6px 0;
  }
  .hero__side li:last-child { border-bottom: none; }
  .hero__side li b { font-weight: 600; color: #111418; }
  .hero__side code {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: #1f7a1c;
    background: rgba(52,204,48,0.08);
    padding: 1px 6px;
    border-radius: 3px;
  }

  /* Style index strip */
  .index-strip {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 0;
    border: 1px solid #1a1d22;
    margin-bottom: 48px;
  }
  .index-strip__cell {
    padding: 16px 18px 18px;
    border-right: 1px solid #1a1d22;
    cursor: pointer;
    position: relative;
    background: #fff;
    transition: background 0.15s;
    text-align: right;
  }
  .index-strip__cell:last-child { border-right: none; }
  .index-strip__cell:hover { background: #fafaf7; }
  .index-strip__cell.is-on {
    background: #111418;
    color: #fff;
  }
  .index-strip__cell.is-on::before {
    content: '';
    position: absolute;
    top: 0; right: 0; left: 0;
    height: 4px;
    background: var(--brand);
  }
  .index-strip__num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: #9ca3af;
    margin-bottom: 4px;
  }
  .index-strip__cell.is-on .index-strip__num { color: var(--brand); }
  .index-strip__name {
    font-family: 'Instrument Serif', serif;
    font-style: italic;
    font-size: 22px;
    line-height: 1.1;
    margin-bottom: 2px;
    letter-spacing: -0.01em;
  }
  .index-strip__tag {
    font-size: 11.5px;
    color: #6b7280;
    line-height: 1.4;
  }
  .index-strip__cell.is-on .index-strip__tag { color: #9ca3af; }

  /* Frame */
  .frame {
    margin-bottom: 48px;
  }

  .frame__head {
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 24px;
    align-items: baseline;
    padding-bottom: 16px;
    margin-bottom: 20px;
    border-bottom: 1px dashed #c9c9c5;
  }

  .frame__head__num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 600;
    color: #6b7280;
    letter-spacing: 0.06em;
  }

  .frame__head__name {
    font-family: 'Instrument Serif', serif;
    font-size: 38px;
    font-weight: 400;
    font-style: italic;
    margin: 0;
    letter-spacing: -0.01em;
    line-height: 1.05;
  }
  .frame__head__name::after {
    content: ' / ';
    color: #9ca3af;
    font-style: normal;
  }
  .frame__head__name em {
    font-style: normal;
    font-family: var(--font-ar);
    font-weight: 500;
    font-size: 22px;
    color: #3c4450;
  }

  .frame__head__notes {
    font-size: 13px;
    color: #6b7280;
    max-width: 320px;
    text-align: end;
    line-height: 1.5;
    font-style: italic;
    font-family: 'Instrument Serif', serif;
  }

  .frame__body {
    display: grid;
    grid-template-columns: 1fr 1.3fr;
    gap: 1px;
    background: #1a1d22;
    border: 1.5px solid #1a1d22;
    overflow: hidden;
    border-radius: 2px;
    box-shadow: 6px 6px 0 rgba(26,29,34,0.08);
  }

  .frame__cell {
    position: relative;
    min-height: 580px;
  }

  .frame__cell-tag {
    position: absolute;
    top: 12px;
    left: 12px;
    z-index: 3;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 4px 8px;
    background: rgba(255,255,255,0.9);
    color: #1a1d22;
    border-radius: 2px;
    backdrop-filter: blur(10px);
    border: 1px solid rgba(26,29,34,0.12);
    pointer-events: none;
  }
  .frame__cell-tag::before {
    content: '';
    width: 5px; height: 5px;
    background: var(--brand);
    border-radius: 50%;
  }

  /* Keyboard hint */
  .kbd-hint {
    margin-top: 20px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11.5px;
    color: #9ca3af;
    display: flex;
    gap: 18px;
    flex-wrap: wrap;
    letter-spacing: 0.02em;
  }
  .kbd-hint kbd {
    display: inline-block;
    font-family: inherit;
    font-size: 10.5px;
    padding: 2px 6px;
    border: 1px solid #d1d5db;
    border-bottom-width: 2px;
    border-radius: 3px;
    background: #fff;
    color: #1a1d22;
    margin-inline-start: 2px;
  }

  @media (max-width: 1040px) {
    .hero { grid-template-columns: 1fr; }
    .index-strip { grid-template-columns: repeat(3, 1fr); }
    .index-strip__cell:nth-child(3) { border-right: none; }
    .index-strip__cell:nth-child(1),
    .index-strip__cell:nth-child(2),
    .index-strip__cell:nth-child(3) { border-bottom: 1px solid #1a1d22; }
    .frame__body { grid-template-columns: 1fr; }
    .frame__head { grid-template-columns: 1fr; }
    .frame__head__notes { text-align: start; max-width: none; }
  }
  @media (max-width: 640px) {
    .index-strip { grid-template-columns: repeat(2, 1fr); }
    .index-strip__cell { border-bottom: 1px solid #1a1d22; }
    .index-strip__cell:nth-child(even) { border-right: none; }
    .mast { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="components.jsx"></script>

<script type="text/babel">
const { useState, useEffect } = React;

const STYLES = [
  { id: 'atelier',  num: '01', name: 'Atelier',  tag: 'ورقي · مطبعي',       notes: 'زوايا حادة، ظلال مصكوكة، تنقيط حبر. للمحتوى الذي يُقرأ بتمهُّل.' },
  { id: 'midnight', num: '02', name: 'Midnight', tag: 'كحلي · تنبيه أخضر', notes: 'سطوح داكنة هادئة، ونبضة خضراء واحدة فقط عند التفاعل.' },
  { id: 'studio',   num: '03', name: 'Studio',   tag: 'أبيض · مصقول',       notes: 'أبيض نقي، حدود شعرية، تفاصيل تكشف عن يدٍ مدركة.' },
  { id: 'bazaar',   num: '04', name: 'Bazaar',   tag: 'دافئ · عربي',         notes: 'أطر مزدوجة، أقواس علوية، ترتيبات مستوحاة من المخطوط.' },
  { id: 'pillow',   num: '05', name: 'Pillow',   tag: 'ناعم · بارز',        notes: 'ظلال مزدوجة نيومورفك. يدعوك للضغط قبل أن تقرأ.' },
  { id: 'terminal', num: '06', name: 'Terminal', tag: 'تقني · داكن',        notes: 'شاشة مطوّر أنيقة، حروف mono، إشارة خضراء دقيقة.' },
];

function App() {
  const [active, setActive] = useState(() => {
    try { return localStorage.getItem('khadum-style') || 'studio'; } catch { return 'studio'; }
  });

  useEffect(() => { try { localStorage.setItem('khadum-style', active); } catch {} }, [active]);

  useEffect(() => {
    const onKey = (e) => {
      const n = parseInt(e.key, 10);
      if (n >= 1 && n <= STYLES.length) setActive(STYLES[n-1].id);
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, []);

  const show = STYLES.find(s => s.id === active) || STYLES[0];
  const themeCls = `kb-${show.id}`;

  return (
    <div className="page">
      <header className="mast">
        <div className="mast__brand">
          <span className="dot"></span>
          خدوم · Design Notes
        </div>
        <div className="mast__meta">
          <span>VOL. 01 · أبريل ٢٠٢٦</span>
          <span>BRAND #34CC30 / #485869</span>
        </div>
      </header>
      <div className="mast-rule-2"></div>

      <section className="hero">
        <div>
          <h1 className="hero__title">
            نظام <em>الأزرار والخيارات</em> —<br/>
            <span className="u">ست لهجات بصرية</span>.
          </h1>
          <p className="hero__lede">
            لكل قسم في منصّة خدوم صوته. هذه <b>ست لغات</b> مدروسة للأزرار وعناصر الاختيار،
            مبنيّة على لونَي الهوية — الأخضر والكحلي — كلٌّ منها تعكس مزاجاً ووظيفة مختلفة.
            اختر واحدةً لاعتمادها، أو اخلِط بين لمساتها بحسب السياق.
          </p>
        </div>
        <aside className="hero__side">
          <h4>المشمولات في كل لهجة</h4>
          <ul>
            <li><span>أزرار أساسية وثانوية</span><b>٤ حالات</b></li>
            <li><span>أزرار خطيرة، أيقونية، تحميل</span><b>٤ حالات</b></li>
            <li><span>خيار واحد / متعدّد</span><b>Radio · Checkbox</b></li>
            <li><span>مفاتيح وقسّامات</span><b>Toggle · Segmented</b></li>
            <li><span>وسوم، قوائم، بطاقات</span><b>Chips · Select · Cards</b></li>
            <li><span>رمز العلامة</span><code>#34cc30</code></li>
          </ul>
        </aside>
      </section>

      <nav className="index-strip" role="tablist">
        {STYLES.map((s, i) => (
          <div
            key={s.id}
            className={`index-strip__cell ${active === s.id ? 'is-on' : ''}`}
            onClick={() => setActive(s.id)}
            role="tab"
            aria-selected={active === s.id}
          >
            <div className="index-strip__num">№ {s.num}  ·  [{i+1}]</div>
            <div className="index-strip__name">{s.name}</div>
            <div className="index-strip__tag">{s.tag}</div>
          </div>
        ))}
      </nav>

      <section className="frame" data-screen-label={`${show.num} ${show.name}`}>
        <div className="frame__head">
          <div className="frame__head__num">LANGUAGE №{show.num} / 06</div>
          <h2 className="frame__head__name">{show.name} <em>{show.tag}</em></h2>
          <p className="frame__head__notes">{show.notes}</p>
        </div>

        <div className="frame__body">
          <div className="frame__cell">
            <span className="frame__cell-tag">Buttons · أزرار</span>
            <ButtonsBoard theme={themeCls} />
          </div>
          <div className="frame__cell">
            <span className="frame__cell-tag">Options · خيارات</span>
            <OptionsBoard theme={themeCls} />
          </div>
        </div>

        <div className="kbd-hint">
          <span>تنقّل سريع:
            <kbd>1</kbd><kbd>2</kbd><kbd>3</kbd><kbd>4</kbd><kbd>5</kbd><kbd>6</kbd>
          </span>
          <span>أو انقر العناوين أعلاه</span>
        </div>
      </section>

    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
